<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebasedatabase.app https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://*.firebasedatabase.app https://*.firebasedatabase.app https://*.googleapis.com https://script.google.com https://www.gstatic.com; frame-src 'self' https://*.firebasedatabase.app; img-src 'self' data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績照合・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
  <title>QuizOpus - ログイン</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/shared.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body class="page-index">
  <h1>QuizOpus</h1>
  <p class="subtitle">解答採点プラットフォーム</p>

  <div class="card">
    <div id="status-msg" class="status-msg-box"></div>

    <!-- タブUI不要: ログイン画面のみ -->

    <!-- 参加セクション -->
    <div id="section-join">
      <label>プロジェクトID</label>
      <input type="text" id="join-id" placeholder="例: a1b2-c3d4-e5f6-g7h8" />
      
      <label>アクセスコード / パスワード</label>
      <div class="password-field-wrap">
        <input type="password" id="join-password" placeholder="合言葉" />
        <span class="password-toggle" onclick="togglePassword('join-password', 'toggle-icon-join')"><i class="fas fa-eye" id="toggle-icon-join"></i></span>
      </div>
      <div class="magic-text"><i class="fa-solid fa-wand-magic-sparkles magic-icon"></i> パスワードの種類から権限を自動判定します</div>
      
      <label>あなたのお名前</label>
      <input type="text" id="join-name" placeholder="例：山田太郎" />
      
      <button class="btn" id="login-btn" onclick="joinProject()">部屋へ入る <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    </div>

    <!-- 新規作成・復元・完了セクション（管理者専用 — 通常非表示） -->
    <div id="section-create" hidden></div>
    <div id="section-success" hidden style="text-align: center;">
      <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
      <h3 class="success-title">作成完了！</h3>
      <p class="success-desc">以下の情報をコピーして安全な場所に保存してください。<br>（マスターパスワードは絶対に他人へ共有しないでください）</p>
      
      <div class="credential-panel" data-stagger>
        <label><i class="fa-solid fa-fingerprint"></i> プロジェクトID</label>
        <div class="credential-row">
          <input type="text" id="success-id" readonly />
          <button class="btn standard" onclick="copyToClipboard('success-id', this)">コピー</button>
        </div>
        <label><i class="fa-solid fa-crown crown-icon"></i> 管理者用 マスターパスワード (コピーして大切に保管)</label>
        <div class="credential-row">
          <input type="text" id="success-admin-pwd" readonly />
          <button class="btn master" onclick="copyToClipboard('success-admin-pwd', this)">コピー</button>
        </div>
        <label><i class="fa-solid fa-users"></i> 採点者用 アクセスコード</label>
        <div class="credential-row">
          <input type="text" id="success-pwd" readonly />
          <button class="btn standard" onclick="copyToClipboard('success-pwd', this)">コピー</button>
        </div>
      </div>
      <button class="btn" onclick="location.href='admin.html'">管理画面へ進む <i class="fa-solid fa-gear"></i></button>
    </div>
    <div id="section-import" hidden></div>
  </div>
  <div style="margin-top: 24px; text-align: center; display: flex; justify-content: center; gap: 16px;">
    <a href="legal.html" style="color: #64748b; font-size: 12px; text-decoration: none;">
      <i class="fa-solid fa-shield-halved"></i> プライバシーポリシー
    </a>
    <a href="help.html" style="color: #64748b; font-size: 12px; text-decoration: none;">
      <i class="fa-solid fa-circle-question"></i> ヘルプ
    </a>
    <a href="javascript:void(0)" onclick="openFeedback()" style="color: #64748b; font-size: 12px; text-decoration: none;">
      <i class="fa-solid fa-comment-dots"></i> フィードバック
    </a>
  </div>
  <script src="js/index.js"></script>
</body>
</html>
