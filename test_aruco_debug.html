<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="js/cv.js"></script>
<script src="js/aruco.js"></script>
<style>
body { font-family: monospace; background: #1a1a2e; color: white; padding: 20px; }
canvas { border: 1px solid #444; margin: 10px; }
.result { padding: 8px; margin: 4px 0; border-radius: 4px; }
.ok { background: #1b5e20; }
.fail { background: #b71c1c; }
</style>
</head>
<body>
<h2>ARUco Marker Detection Debug Test</h2>

<h3>Test 1: Individual marker images (white background)</h3>
<div id="test1"></div>

<h3>Test 2: Simulated PDF page (markers in corners of A4)</h3>
<canvas id="pdf-sim" width="630" height="891"></canvas>
<div id="test2"></div>

<h3>Test 3: Load actual generated PDF</h3>
<input type="file" id="pdf-file" accept=".pdf" />
<button onclick="testPDF()">Test PDF</button>
<canvas id="pdf-canvas" style="display:none"></canvas>
<div id="test3"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Test 1: Individual markers
const markerIds = [0, 1, 2, 3];
let loaded = 0;

markerIds.forEach(id => {
    const img = new Image();
    img.src = `aruco_markers/marker_id${id}.png`;
    img.onload = () => {
        // Draw on canvas with white background
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        
        // White background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 200, 200);
        
        // Draw marker with quiet zone
        ctx.drawImage(img, 30, 30, 140, 140);
        
        const imageData = ctx.getImageData(0, 0, 200, 200);
        const detector = new AR.Detector();
        const markers = detector.detect(imageData);
        
        const div = document.getElementById('test1');
        div.appendChild(canvas);
        
        const result = document.createElement('div');
        result.className = `result ${markers.length > 0 ? 'ok' : 'fail'}`;
        
        if (markers.length > 0) {
            result.textContent = `marker_id${id}.png → DETECTED: id=${markers[0].id}, corners at: ${JSON.stringify(markers[0].corners.map(c => ({x:Math.round(c.x), y:Math.round(c.y)})))}`;
        } else {
            result.textContent = `marker_id${id}.png → NOT DETECTED. Candidates found: ${detector.candidates.length}, Contours: ${detector.contours.length}, Polys: ${detector.polys.length}`;
        }
        div.appendChild(result);
        
        loaded++;
        if (loaded === 4) runTest2();
    };
});

// Test 2: Simulate a PDF page with markers in corners
function runTest2() {
    const canvas = document.getElementById('pdf-sim');
    const ctx = canvas.getContext('2d');
    
    // Scale: A4 = 210x297mm, at 3px/mm = 630x891
    const scale = 3;
    
    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw some grid lines (simulating answer boxes)
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 20; i++) {
        for (let j = 0; j < 5; j++) {
            ctx.strokeRect(15*scale + j * 36*scale, 5*scale + i * 12.75*scale, 36*scale, 12.75*scale);
        }
    }
    
    const markerSize = 10 * scale; // 10mm * 3px/mm = 30px
    const margin = 5 * scale;     // 5mm * 3px/mm = 15px
    
    const positions = [
        { x: margin, y: margin },
        { x: canvas.width - margin - markerSize, y: margin },
        { x: margin, y: canvas.height - margin - markerSize },
        { x: canvas.width - margin - markerSize, y: canvas.height - margin - markerSize }
    ];
    
    let markersLoaded = 0;
    positions.forEach((pos, idx) => {
        const img = new Image();
        img.src = `aruco_markers/marker_id${idx}.png`;
        img.onload = () => {
            ctx.drawImage(img, pos.x, pos.y, markerSize, markerSize);
            markersLoaded++;
            
            if (markersLoaded === 4) {
                // Now detect
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const detector = new AR.Detector();
                const markers = detector.detect(imageData);
                
                const div = document.getElementById('test2');
                const result = document.createElement('div');
                result.className = `result ${markers.length === 4 ? 'ok' : 'fail'}`;
                result.innerHTML = `Detected ${markers.length}/4 markers.<br>` +
                    `IDs found: ${markers.map(m => m.id).join(', ')}<br>` +
                    `Candidates: ${detector.candidates.length}, Contours: ${detector.contours.length}<br>` +
                    `Canvas size: ${canvas.width}x${canvas.height}, Marker size: ${markerSize}px<br>` +
                    `minSize threshold (0.10 * width): ${Math.round(canvas.width * 0.10)}`;
                div.appendChild(result);
                
                // Also show marker details
                markers.forEach(m => {
                    const detail = document.createElement('div');
                    detail.className = 'result ok';
                    detail.textContent = `ID ${m.id}: center≈(${Math.round((m.corners[0].x+m.corners[2].x)/2)}, ${Math.round((m.corners[0].y+m.corners[2].y)/2)})`;
                    div.appendChild(detail);
                });
            }
        };
    });
}

// Test 3: Test with actual PDF
async function testPDF() {
    const file = document.getElementById('pdf-file').files[0];
    if (!file) { alert('PDFを選択'); return; }
    
    const arrayBuffer = await file.arrayBuffer();
    const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdfDoc.getPage(1);
    
    // Try different scales
    const scales = [1.0, 1.5, 2.0, 3.0];
    const div = document.getElementById('test3');
    div.innerHTML = '';
    
    for (const scale of scales) {
        const viewport = page.getViewport({ scale });
        const canvas = document.getElementById('pdf-canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        
        // White background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        await page.render({ canvasContext: ctx, viewport }).promise;
        
        // Check for transparency
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let transparentPixels = 0;
        for (let i = 0; i < imgData.data.length; i += 4) {
            if (imgData.data[i + 3] < 255) transparentPixels++;
        }
        
        // Flatten transparency
        for (let i = 0; i < imgData.data.length; i += 4) {
            if (imgData.data[i + 3] < 255) {
                const a = imgData.data[i + 3] / 255;
                imgData.data[i] = imgData.data[i] * a + 255 * (1 - a);
                imgData.data[i + 1] = imgData.data[i + 1] * a + 255 * (1 - a);
                imgData.data[i + 2] = imgData.data[i + 2] * a + 255 * (1 - a);
                imgData.data[i + 3] = 255;
            }
        }
        ctx.putImageData(imgData, 0, 0);
        
        // Detect markers
        const detector = new AR.Detector();
        const markers = detector.detect(imgData);
        
        const result = document.createElement('div');
        result.className = `result ${markers.length >= 4 ? 'ok' : 'fail'}`;
        result.innerHTML = `Scale ${scale}: Canvas ${canvas.width}x${canvas.height}<br>` +
            `Transparent pixels: ${transparentPixels}<br>` +
            `Detected markers: ${markers.length} (IDs: ${markers.map(m => m.id).join(', ')})<br>` +
            `Candidates: ${detector.candidates.length}, Contours: ${detector.contours.length}, Polys: ${detector.polys.length}<br>` +
            `minSize (0.10*w): ${Math.round(canvas.width * 0.10)}`;
        div.appendChild(result);
        
        // Show a visible canvas at this scale
        if (scale === 1.5) {
            const visCanvas = document.createElement('canvas');
            visCanvas.width = canvas.width;
            visCanvas.height = canvas.height;
            visCanvas.style.width = '400px';
            visCanvas.style.border = '1px solid yellow';
            const visCtx = visCanvas.getContext('2d');
            visCtx.putImageData(imgData, 0, 0);
            
            // Draw detected marker locations
            markers.forEach(m => {
                visCtx.strokeStyle = 'red';
                visCtx.lineWidth = 3;
                visCtx.beginPath();
                visCtx.moveTo(m.corners[0].x, m.corners[0].y);
                for (let i = 1; i < 4; i++) visCtx.lineTo(m.corners[i].x, m.corners[i].y);
                visCtx.closePath();
                visCtx.stroke();
                
                visCtx.fillStyle = 'red';
                visCtx.font = '20px monospace';
                visCtx.fillText(`ID:${m.id}`, m.corners[0].x, m.corners[0].y - 5);
            });
            
            div.appendChild(visCanvas);
        }
    }
}
</script>
</body>
</html>
