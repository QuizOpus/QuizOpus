<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - 当日受付</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body { padding: 24px; display: flex; flex-direction: column; align-items: center; }

        .top-bar {
            width: 100%; max-width: 500px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .top-bar h1 { font-size: 22px; flex: 1; }

        #camera-container { position: relative; width: 100%; max-width: 500px; }
        #video {
            width: 100%; border-radius: var(--radius-lg);
            border: 2px solid var(--glass-border); background: #000;
        }
        #canvas { display: none; }

        #scanning-text {
            margin-top: 12px; color: var(--text-muted); font-size: 14px;
            text-align: center; font-weight: 600;
        }

        #result {
            margin-top: 16px; width: 100%; max-width: 500px;
            padding: 20px; border-radius: var(--radius-lg);
            text-align: center; font-size: 18px; display: none;
            font-weight: 600;
        }
        #result.success { background: rgba(16,185,129,0.15); border: 2px solid rgba(16,185,129,0.5); color: #34d399; }
        #result.error { background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.5); color: #f87171; }
        #result.already { background: rgba(245,158,11,0.15); border: 2px solid rgba(245,158,11,0.5); color: #fbbf24; }
        #result.canceled { background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.5); color: #f87171; }
        #result.loading { background: rgba(59,130,246,0.15); border: 2px solid rgba(59,130,246,0.5); color: #60a5fa; }
        .name { font-size: 28px; font-weight: 800; margin: 10px 0; color: var(--text-main); }
        .number { font-size: 16px; color: var(--text-muted); }

        .stats-bar {
            margin-top: 24px; width: 100%; max-width: 500px;
        }
        .stats-bar h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; }
        .stats-row { display: flex; justify-content: space-around; gap: 16px; }
        .stat-item {
            text-align: center; flex: 1; padding: 16px;
        }
        .stat-item .stat-num { font-size: 28px; font-weight: 800; }
        .stat-item .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="header-left">
            <h1 id="page-title"><i class="fa-solid fa-qrcode"></i> 当日受付</h1>
        </div>
        <div class="header-right">
            <div class="admin-dropdown" id="global-menu-container">
                <button class="btn secondary" onclick="document.getElementById('global-menu').classList.toggle('show')">
                    <i class="fa-solid fa-bars"></i> メニュー
                </button>
                <div id="global-menu" class="dropdown-content">
                    <div style="padding: 12px; border-bottom: 1px solid var(--glass-border); margin-bottom: 8px; text-align: center;">
                        <div id="dropdown-scorer-name" style="font-weight: 800; color: var(--text-main); font-size: 15px; margin-bottom: 6px;"></div>
                        <div id="dropdown-scorer-role" class="scorer-badge" style="display:inline-block; padding: 4px 12px;"></div>
                    </div>
                    <button class="btn secondary" onclick="location.href='judge.html'"><i class="fa-solid fa-list-check"></i> 問題一覧</button>
                    <button class="btn secondary" onclick="location.href='entry.html?pid='+projectId"><i class="fa-solid fa-pen-to-square"></i> エントリーフォーム</button>
                    <button class="btn secondary" onclick="location.href='entry_list.html?pid='+projectId"><i class="fa-solid fa-list"></i> エントリーリスト</button>
                    <button class="btn secondary active" onclick="location.href='checkin.html?pid='+projectId"><i class="fa-solid fa-qrcode"></i> 当日受付</button>
                    
                    <div id="admin-menu-items" style="display:none; flex-direction:column; gap:4px; margin-top:8px; padding-top:8px; border-top:1px solid var(--glass-border)">
                        <button class="btn secondary" onclick="location.href='admin.html'"><i class="fa-solid fa-gauge"></i> 管理画面</button>
                        <button class="btn danger" onclick="location.href='conflict.html'"><i class="fa-solid fa-triangle-exclamation"></i> 要確認</button>
                    </div>

                    <div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--glass-border)">
                        <button class="btn secondary" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <p id="scanning-text"><i class="fa-solid fa-camera"></i> QRコードをカメラにかざしてください</p>
    <div id="result"></div>

    <div class="stats-bar glass-panel" id="stats-bar" style="display:none;">
        <h3><i class="fa-solid fa-chart-bar"></i> 受付状況</h3>
        <div class="stats-row">
            <div class="stat-item glass-panel">
                <div class="stat-num" id="stat-total" style="color: var(--primary)">-</div>
                <div class="stat-label"><i class="fa-solid fa-users"></i> エントリー数</div>
            </div>
            <div class="stat-item glass-panel">
                <div class="stat-num" id="stat-checked" style="color: #34d399">-</div>
                <div class="stat-label"><i class="fa-solid fa-check"></i> 受付済み</div>
            </div>
            <div class="stat-item glass-panel">
                <div class="stat-num" id="stat-remaining" style="color: #fbbf24">-</div>
                <div class="stat-label"><i class="fa-solid fa-clock"></i> 未受付</div>
            </div>
        </div>
    </div>

    <script src="js/checkin.js"></script>
</body>
</html>
