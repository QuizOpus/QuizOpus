<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当日受付</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .top-bar {
            width: 100%; max-width: 500px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; flex: 1; }
        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            color: white; font-size: 14px; cursor: pointer;
        }
        .btn.secondary { background: #0f3460; border: 1px solid #444; }
        .btn.secondary:hover { background: #1a4a7a; }

        #camera-container { position: relative; width: 100%; max-width: 500px; }
        #video { width: 100%; border-radius: 12px; border: 3px solid #444; background: #000; }
        #canvas { display: none; }

        #result {
            margin-top: 16px; width: 100%; max-width: 500px;
            padding: 20px; border-radius: 12px;
            text-align: center; font-size: 20px; display: none;
        }
        #result.success { background: #1b5e20; border: 2px solid #4caf50; }
        #result.error { background: #b71c1c; border: 2px solid #ef5350; }
        #result.already { background: #e65100; border: 2px solid #ff9800; }
        #result.canceled { background: #b71c1c; border: 2px solid #ef5350; }
        #result.loading { background: #1a237e; border: 2px solid #3f51b5; }
        .name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .number { font-size: 18px; color: #aaa; }

        #scanning-text { margin-top: 12px; color: #aaa; font-size: 14px; }

        .stats-bar {
            margin-top: 20px; padding: 16px; background: #16213e;
            border-radius: 12px; width: 100%; max-width: 500px;
        }
        .stats-bar h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .stats-row { display: flex; justify-content: space-around; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 戻る</button>
        <h1 id="page-title">当日受付</h1>
    </div>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <p id="scanning-text">QRコードをカメラにかざしてください</p>
    <div id="result"></div>

    <div class="stats-bar" id="stats-bar" style="display:none;">
        <h3>受付状況</h3>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" id="stat-total">-</div>
                <div class="stat-label">エントリー数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-checked" style="color:#4caf50">-</div>
                <div class="stat-label">受付済み</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-remaining" style="color:#ff9800">-</div>
                <div class="stat-label">未受付</div>
            </div>
        </div>
    </div>

    <script>
        const projectId = session.projectId;
        if (!projectId) { alert('プロジェクトに入室してください'); location.href = 'index.html'; }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        const scanningText = document.getElementById('scanning-text');
        let processing = false;
        let lastUUID = '';
        let hideTimer = null;

        // プロジェクト名読み込み
        (async function init() {
            const snap = await db.ref(`projects/${projectId}/settings`).once('value');
            if (snap.exists()) {
                const s = snap.val();
                document.getElementById('page-title').textContent = (s.projectName || '') + ' 受付';
            }
            loadStats();
        })();

        async function loadStats() {
            const snap = await db.ref(`projects/${projectId}/entries`).once('value');
            if (!snap.exists()) return;
            let total = 0, checked = 0;
            snap.forEach(child => {
                const v = child.val();
                if (v.status !== 'canceled') {
                    total++;
                    if (v.checkedIn) checked++;
                }
            });
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-checked').textContent = checked;
            document.getElementById('stat-remaining').textContent = total - checked;
            document.getElementById('stats-bar').style.display = 'block';
        }

        // カメラ起動（リファレンス準拠: 即座に起動）
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
                video.play();
                requestAnimationFrame(scanFrame);
            })
            .catch(err => {
                scanningText.textContent = 'カメラの起動に失敗しました: ' + err.message;
            });

        // スキャンループ（リファレンス準拠: 常時スキャン、重複防止付き）
        function scanFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code && !processing && code.data !== lastUUID) {
                    processing = true;
                    lastUUID = code.data;
                    showLoading();
                    processQR(code.data);
                }
            }
            requestAnimationFrame(scanFrame);
        }

        function showLoading() {
            if (hideTimer) clearTimeout(hideTimer);
            resultDiv.style.display = 'block';
            resultDiv.className = 'loading';
            resultDiv.innerHTML = '<div>⏳ 読み込み中...</div>';
        }

        // Firebase直接参照（リファレンスのGAS方式ではなく、Firebase直接）
        async function processQR(uuid) {
            try {
                const snap = await db.ref(`projects/${projectId}/entries/${uuid}`).once('value');

                if (!snap.exists()) {
                    showResultUI('error', '❌ 該当者が見つかりません', '', '');
                } else {
                    const data = snap.val();
                    if (data.status === 'canceled') {
                        showResultUI('canceled', '❌ キャンセル済み', `${data.familyName} ${data.firstName}`, `受付番号 ${data.entryNumber}`);
                    } else if (data.checkedIn) {
                        showResultUI('already', '⚠️ 受付済み', `${data.familyName} ${data.firstName}`, `受付番号 ${data.entryNumber}`);
                    } else {
                        await db.ref(`projects/${projectId}/entries/${uuid}/checkedIn`).set(true);
                        showResultUI('success', '✅ 受付完了', `${data.familyName} ${data.firstName}`, `受付番号 ${data.entryNumber}`);
                        loadStats();
                    }
                }
            } catch (err) {
                showResultUI('error', '❌ エラーが発生しました', err.message, '');
                lastUUID = ''; // エラー時はリトライ可能に
            }
            processing = false;
        }

        function showResultUI(type, title, name, number) {
            if (hideTimer) clearTimeout(hideTimer);
            resultDiv.style.display = 'block';
            resultDiv.className = type;
            resultDiv.innerHTML = `
                <div>${title}</div>
                ${name ? `<div class="name">${name}</div>` : ''}
                ${number ? `<div class="number">${number}</div>` : ''}
            `;
            scanningText.textContent = 'QRコードをカメラにかざしてください';

            // 3秒後に結果を非表示にし、同じQRの再スキャンを許可
            hideTimer = setTimeout(() => {
                resultDiv.style.display = 'none';
                lastUUID = '';
            }, 3000);
        }
    </script>
</body>
</html>
