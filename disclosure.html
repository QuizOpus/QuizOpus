<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th - 成績開示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 480px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .logo p { color: #8e8ea0; font-size: 14px; margin-top: 6px; }

        .card {
            background: rgba(22, 33, 62, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        label { font-size: 13px; color: #8e8ea0; display: block; margin-bottom: 6px; margin-top: 18px; }
        label:first-of-type { margin-top: 0; }
        input {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(15,52,96,0.6);
            color: white; font-size: 18px; font-family: 'Outfit', monospace;
            letter-spacing: 4px; text-align: center;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #7c5cfc; }
        input::placeholder { letter-spacing: 0; font-size: 14px; color: #555; }
        .submit-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #7c5cfc, #a855f7);
            color: white; font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 28px; transition: transform 0.15s, box-shadow 0.2s;
            font-family: 'Outfit', sans-serif;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,92,252,0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg {
            margin-top: 16px; padding: 12px; border-radius: 10px;
            background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.3);
            color: #ef5350; font-size: 14px; text-align: center; display: none;
        }

        /* 結果表示 */
        .result { display: none; }
        .result-header {
            text-align: center; margin-bottom: 24px;
            padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .result-name { font-size: 22px; font-weight: 700; }
        .result-score {
            font-size: 64px; font-weight: 700; margin: 12px 0;
            background: linear-gradient(135deg, #7c5cfc, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .result-score-label { font-size: 14px; color: #8e8ea0; }
        .result-grid {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;
            margin-top: 16px;
        }
        .result-cell {
            aspect-ratio: 1; border-radius: 6px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; transition: transform 0.1s;
        }
        .result-cell:hover { transform: scale(1.15); }
        .result-cell .q-num { font-size: 8px; color: rgba(255,255,255,0.5); margin-bottom: 1px; }
        .result-cell.correct { background: rgba(76,175,80,0.25); color: #81c784; }
        .result-cell.wrong { background: rgba(239,83,80,0.2); color: #ef9a9a; }

        .back-btn {
            display: block; margin: 24px auto 0; padding: 10px 24px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
            background: transparent; color: #8e8ea0; font-size: 14px;
            cursor: pointer; font-family: 'Outfit', sans-serif; transition: color 0.2s;
        }
        .back-btn:hover { color: white; }

        .disabled-msg {
            text-align: center; padding: 40px 20px;
            color: #8e8ea0; font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>CIQ the 13th</h1>
            <p>1R 成績開示</p>
        </div>

        <div class="card" id="login-card">
            <label>受付番号</label>
            <input type="text" id="entry-number" maxlength="3" placeholder="001" inputmode="numeric" autocomplete="off">
            <label>開示用パスワード</label>
            <input type="text" id="pw-input" maxlength="6" placeholder="英数字6桁" autocomplete="off">
            <button class="submit-btn" id="submit-btn" onclick="checkDisclosure()">成績を確認する</button>
            <div class="error-msg" id="error-msg"></div>
        </div>

        <div class="card result" id="result-card">
            <div class="result-header">
                <div class="result-name" id="result-name"></div>
                <div class="result-score" id="result-score"></div>
                <div class="result-score-label">点 / <span id="result-total">100</span>問</div>
            </div>
            <div style="font-size:13px;color:#8e8ea0;margin-bottom:8px">各問の正誤</div>
            <div class="result-grid" id="result-grid"></div>
            <button class="back-btn" onclick="showLogin()">← 戻る</button>
        </div>

        <div class="card disabled-msg" id="disabled-card" style="display:none">
            <p>🔒 成績開示は現在無効です。</p>
            <p style="margin-top:8px;font-size:13px">管理者が開示を有効にするまでお待ちください。</p>
        </div>
    </div>

    <script>
    const params = new URLSearchParams(location.search);
    const projectId = params.get('pid');

    if (!projectId) {
        document.querySelector('.container').innerHTML = '<div class="card disabled-msg"><p>プロジェクトが指定されていません。</p><p style="margin-top:8px;font-size:13px">URLに ?pid=プロジェクトID を追加してアクセスしてください。</p></div>';
    }

    let disclosureEnabled = false;

    async function init() {
        if (!projectId) return;
        // 開示が有効かチェック
        const cfgSnap = await db.ref(`projects/${projectId}/entryConfig/disclosureEnabled`).get();
        disclosureEnabled = cfgSnap.exists() && cfgSnap.val() === true;

        if (!disclosureEnabled) {
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('disabled-card').style.display = 'block';
        }
    }

    async function checkDisclosure() {
        const entryNum = document.getElementById('entry-number').value.trim();
        const pw = document.getElementById('pw-input').value.trim();
        const errEl = document.getElementById('error-msg');
        const btn = document.getElementById('submit-btn');

        errEl.style.display = 'none';

        if (!entryNum || !pw) {
            errEl.textContent = '受付番号とパスワードを入力してください。';
            errEl.style.display = 'block'; return;
        }

        const num = parseInt(entryNum, 10);
        if (isNaN(num) || num < 1) {
            errEl.textContent = '正しい受付番号を入力してください。';
            errEl.style.display = 'block'; return;
        }

        btn.disabled = true; btn.textContent = '確認中...';

        try {
            // パスワード照合: entries からUUIDで検索
            const entriesSnap = await db.ref(`projects/${projectId}/entries`)
                .orderByChild('entryNumber').equalTo(num).once('value');

            if (!entriesSnap.exists()) {
                errEl.textContent = '該当する受付番号が見つかりません。';
                errEl.style.display = 'block'; btn.disabled = false; btn.textContent = '成績を確認する'; return;
            }

            let matched = false;
            let entryData = null;
            const pwHash = await hashPassword(pw);

            entriesSnap.forEach(child => {
                const d = child.val();
                if (d.disclosurePw === pwHash || d.disclosurePw === pw) {
                    matched = true; entryData = d;
                }
            });

            if (!matched) {
                errEl.textContent = 'パスワードが正しくありません。';
                errEl.style.display = 'block'; btn.disabled = false; btn.textContent = '成績を確認する'; return;
            }

            // 開示データ取得
            const discSnap = await db.ref(`projects/${projectId}/disclosure/${num}`).get();
            if (!discSnap.exists()) {
                errEl.textContent = '開示データがまだ生成されていません。管理者にお問い合わせください。';
                errEl.style.display = 'block'; btn.disabled = false; btn.textContent = '成績を確認する'; return;
            }

            const disc = discSnap.val();
            showResult(entryData.entryName || `受付番号 ${num}`, disc.score, disc.results, disc.totalQuestions || 100);

        } catch(e) {
            console.error(e);
            errEl.textContent = 'エラーが発生しました。もう一度お試しください。';
            errEl.style.display = 'block';
        }
        btn.disabled = false; btn.textContent = '成績を確認する';
    }

    function showResult(name, score, results, total) {
        document.getElementById('login-card').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('result-name').textContent = name;
        document.getElementById('result-score').textContent = score;
        document.getElementById('result-total').textContent = total;

        const grid = document.getElementById('result-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= total; i++) {
            const r = results?.[`q${i}`] || 'wrong';
            const cell = document.createElement('div');
            cell.className = `result-cell ${r === 'correct' ? 'correct' : 'wrong'}`;
            cell.innerHTML = `<span class="q-num">${i}</span>${r === 'correct' ? '○' : '×'}`;
            grid.appendChild(cell);
        }
    }

    function showLogin() {
        document.getElementById('result-card').style.display = 'none';
        document.getElementById('login-card').style.display = 'block';
    }

    // Enterキーで送信
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.getElementById('login-card').style.display !== 'none') {
            checkDisclosure();
        }
    });

    init();
    </script>
</body>
</html>
